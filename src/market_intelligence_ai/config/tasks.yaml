market_research_task:
  description: >
    Conduct comprehensive market research for the AI product idea: {product_idea}.

    Your analysis must include:
    1. Market Size and Growth:
       - TAM, SAM, SOM
       - Growth trends (3-5 years)
       - Market drivers

    2. Industry Trends:
       - Technology trends
       - AI adoption patterns
       - Opportunities and threats

    3. Regulatory Landscape:
       - Compliance requirements
       - Data privacy concerns

    4. Technology Readiness:
       - Infrastructure and ecosystem

    Use only the provided tools (SerperDevTool and ScrapeWebsiteTool).
    Use SerperDevTool for searching information.
    Do not call any tool that is not available.

  expected_output: >
    A structured market research report with:
    - Executive summary
    - Market size and trends
    - Key insights
    - Supporting data with sources

  agent: market_research_specialist

competitive_intelligence_task:
  description: >
    Analyze competitors for the AI product idea: {product_idea}.

    Include:
    1. Direct and indirect competitors
    2. Features, pricing, positioning
    3. Strengths and weaknesses
    4. Market gaps

    Use only the provided tools (SerperDevTool and ScrapeWebsiteTool).
    Use SerperDevTool for competitor research.

  expected_output: >
    Competitive analysis report with:
    - Competitor list
    - Comparison table
    - Market gaps
    - Strategic insights

  agent: competitive_intelligence_analyst

customer_insights_task:
  description: >
    Analyze target customers for: {product_idea}.

    Include:
    1. Customer segments
    2. Pain points
    3. Needs and behavior
    4. Willingness to pay

    Use only the provided tools (SerperDevTool and ScrapeWebsiteTool).
    Use SerperDevTool to find user reviews and discussions.

  expected_output: >
    Customer insights report with:
    - Segments
    - Personas
    - Pain points
    - Key insights

  agent: customer_insights_researcher

product_strategy_task:
  description: >
    Create a product strategy for: {product_idea}.

    Include:
    1. Product vision
    2. MVP features
    3. Differentiation
    4. Roadmap

    Use previous task outputs and available tools.
    Do not use any undefined tools.

  expected_output: >
    Product strategy document with:
    - MVP features
    - Roadmap
    - Differentiation strategy

  agent: product_strategy_advisor

business_analyst_task:
  description: >
    Generate final business report for: {product_idea}.

    Include:
    1. Pricing strategy
    2. Revenue model
    3. Risk analysis
    4. Final recommendation

    Use insights from all previous tasks only.
    Do not call any external or undefined tools.

  expected_output: >
    Final business report including:
    - Pricing model
    - Financial insights
    - Risk analysis
    - Go/No-Go decision

  agent: business_analyst
